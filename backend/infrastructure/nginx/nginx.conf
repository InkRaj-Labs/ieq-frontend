events {
    worker_connections 1024;
}

http {
    # ── Upstream ──────────────────────────────────────────────────────────────
    upstream ieq_backend {
        server backend:8000;
        keepalive 32;
    }

    # ── Rate Limiting Zones ───────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=chat:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=generate:10m rate=5r/m;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── HTTP → redirect (uncomment when using HTTPS) ──────────────────────────
    # server {
    #     listen 80;
    #     return 301 https://$host$request_uri;
    # }

    # ── Main Server ───────────────────────────────────────────────────────────
    server {
        listen 80;
        # listen 443 ssl;  # Uncomment for HTTPS
        server_name _;

        # SSL (uncomment + configure for HTTPS)
        # ssl_certificate     /etc/nginx/certs/fullchain.pem;
        # ssl_certificate_key /etc/nginx/certs/privkey.pem;
        # ssl_protocols       TLSv1.2 TLSv1.3;

        # ── Security Headers ─────────────────────────────────────────────────
        add_header X-Frame-Options SAMEORIGIN;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy strict-origin-when-cross-origin;

        # ── CORS preflight ────────────────────────────────────────────────────
        location /ieq/ {
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin  $http_origin;
                add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS';
                add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-API-Key';
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                return 204;
            }

            # General API rate limit
            limit_req zone=api burst=10 nodelay;

            proxy_pass         http://ieq_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Streaming support
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # Chat endpoint — tighter rate limit, longer timeout for streams
        location /ieq/chat {
            limit_req zone=chat burst=5 nodelay;

            proxy_pass         http://ieq_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 600s;
        }

        # Image generation — even tighter
        location /ieq/generate {
            limit_req zone=generate burst=2 nodelay;

            proxy_pass         http://ieq_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;

            proxy_read_timeout 600s;
        }

        # Health check — no rate limit
        location /ieq/health {
            proxy_pass         http://ieq_backend;
            proxy_http_version 1.1;
            access_log         off;
        }

        # API docs
        location /docs {
            proxy_pass http://ieq_backend;
        }
        location /redoc {
            proxy_pass http://ieq_backend;
        }
        location /openapi.json {
            proxy_pass http://ieq_backend;
        }

        # Root health
        location / {
            proxy_pass http://ieq_backend;
        }
    }
}
